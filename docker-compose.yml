version: '3.8'

services:
  server:
    build:
      context: ./server
    ports:
      - "5002:5002"
    env_file:
      - ./server/.env
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5002
    ports:
      - "5173:80"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: